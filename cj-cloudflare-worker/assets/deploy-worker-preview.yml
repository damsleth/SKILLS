name: Deploy Worker Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: deploy-worker-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: __NODE_VERSION__
          cache: __CACHE_MODE__

      - name: Install dependencies
        run: __INSTALL_COMMAND__

      - name: Deploy preview Worker
        id: deploy_preview
        shell: bash
        run: |
          set -eo pipefail
          deploy_output=$(__PREVIEW_DEPLOY_COMMAND__ 2>&1 | tee /tmp/wrangler-preview.log)
          preview_url=$(echo "$deploy_output" | grep -Eo 'https://[^ ]+workers.dev' | tail -n 1 || true)
          if [ -n "$preview_url" ]; then
            echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy_preview.outputs.preview_url != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.preview_url }}
        with:
          script: |
            const marker = "<!-- worker-preview-url -->"
            const body = `${marker}\nWorker preview deployed: ${process.env.PREVIEW_URL}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            })

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }
